# Activated with @ActiveProfiles("test") on @SpringBootTest classes.
# Keeps main application.properties and only redirects JDBC to an isolated schema.
# Create once:
#   CREATE DATABASE monargent_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

spring.datasource.url=jdbc:mysql://localhost:3306/monargent_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.jpa.hibernate.ddl-auto=update
app.seed-test-user=false
