spring.datasource.url=jdbc:mysql://localhost:3306/monargent
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

## SMTP (Gmail) - prefer setting credentials via environment variables
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT:10000}

jwt.secret=bW9uYXJnZW50LXN1cGVyLXNlY3JldC1rZXktMjAyNi1tb25hcmdlbnQ=
jwt.expiration-ms=86400000
auth.verification.expiration-minutes=10
# Optional: SendGrid API key (if set, SendGrid API will be used). Leave empty to use SMTP.
sendgrid.api.key=

# In development set to true to return verificationCode in API responses for manual testing.
# For real email delivery, set this to false and configure SMTP or SendGrid credentials.
auth.dev.return-code=false