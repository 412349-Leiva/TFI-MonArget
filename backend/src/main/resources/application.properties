# ===================================================================
# External Env Configuration
# ===================================================================
spring.config.import=optional:file:./.env[.properties],optional:file:backend/.env[.properties]

# ===================================================================
# Database Configuration (MySQL)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/monargent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# ===================================================================
# JPA / Hibernate Configuration
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===================================================================
# Mail Configuration (Gmail SMTP)
# ===================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.from=${MAIL_FROM:${MAIL_USERNAME}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===================================================================
# JWT Configuration
# ===================================================================
jwt.secret=${JWT_SECRET}
# 86400000 ms = 24 Horas de duración del Token
jwt.expiration-ms=86400000

# ===================================================================
# Verification Configuration
# ===================================================================
auth.verification.expiration-minutes=10