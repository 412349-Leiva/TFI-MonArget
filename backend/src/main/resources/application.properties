# ===================================================================
# External Env Configuration
# ===================================================================
spring.config.import=optional:file:./.env[.properties],optional:file:backend/.env[.properties]

# ===================================================================
# Server Configuration
# ===================================================================
server.servlet.context-path=/api/v1

# ===================================================================
# Jackson / JSON Serialization
# ===================================================================
spring.jackson.serialization.write-dates-as-timestamps=false

# ===================================================================
# Database Configuration (MySQL)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/monargent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

# ===================================================================
# JPA / Hibernate Configuration
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===================================================================
# Mail Configuration (Gmail SMTP)
# ===================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.from=${MAIL_FROM:${MAIL_USERNAME}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===================================================================
# JWT Configuration
# ===================================================================
jwt.secret=${JWT_SECRET}
# 86400000 ms = 24 Horas de duración del Token
jwt.expiration-ms=86400000

# ===================================================================
# Verification Configuration
# ===================================================================
auth.verification.expiration-minutes=10

# ===================================================================
# External Integrations
# ===================================================================
# OCR.Space API key — get one free at https://ocr.space/ocrapi
ocr.api-key=${OCR_API_KEY:helloworld}
ocr.api-url=${OCR_API_URL:https://api.ocr.space/parse/image}

# Google Gemini API key — get one at https://aistudio.google.com/app/apikey
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

spring.ai.openai.api-key=${GEMINI_API_KEY}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com
spring.ai.openai.chat.completions-path=/v1beta/openai/chat/completions
spring.ai.openai.chat.options.model=${GEMINI_MODEL:gemini-flash-latest}

# File upload max size
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===================================================================
# CORS (PWA movil con ngrok — patrones wildcard, sin editar en cada reinicio)
# ===================================================================
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://*.ngrok-free.app,https://*.ngrok-free.dev,https://*.ngrok.io,https://*.ngrok.app}

# ===================================================================
# Springdoc / Swagger
# ===================================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.url=/v3/api-docs
springdoc.override-with-generic-response=false